services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: media_manager
      POSTGRES_USER: media_manager
      POSTGRES_PASSWORD: media_manager
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media_manager -d media_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      ADDR: ":18080"
      APP_ENV: development
      DATABASE_URL: postgres://media_manager:media_manager@postgres:5432/media_manager?sslmode=disable
      WEB_DIR: /app/web
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      MEDIA_DATA_DIR: /data
    ports:
      - "18080:18080"
    volumes:
      - ./.data/media:/data
    depends_on:
      postgres:
        condition: service_healthy

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Etc/UTC}"
    ports:
      - "${SABNZBD_PORT:-18081}:8080"
    volumes:
      - ./.data/media/sabnzbd:/config
    restart: unless-stopped

volumes:
  postgres-data:
