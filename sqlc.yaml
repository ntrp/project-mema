version: "2"
sql:
  - engine: postgresql
    schema:
      - internal/storage/migrations/00001_initial_schema.sql
      - internal/storage/sqlc_schema/river_job.sql
    queries: internal/storage/queries
    gen:
      go:
        package: storage
        out: internal/storage/generated
        sql_package: pgx/v5
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: uuid
            nullable: true
            go_type:
              import: github.com/google/uuid
              type: UUID
              pointer: true
          - db_type: timestamptz
            go_type:
              import: time
              type: Time
          - db_type: timestamptz
            nullable: true
            go_type:
              import: time
              type: Time
              pointer: true
          - db_type: pg_catalog.timestamptz
            go_type:
              import: time
              type: Time
          - db_type: pg_catalog.timestamptz
            nullable: true
            go_type:
              import: time
              type: Time
              pointer: true
          - db_type: pg_catalog.numeric
            go_type: float64
          - db_type: pg_catalog.numeric
            nullable: true
            go_type:
              type: float64
              pointer: true
