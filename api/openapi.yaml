openapi: 3.0.3
info:
  title: Media Manager API
  version: 0.0.0
  description: >
    Contract-first API for the self-hosted media manager. The project name is
    not final; do not use the codename in generated public identifiers.
servers:
  - url: /api
    description: Same-origin API served by the Go backend
tags:
  - name: Health
  - name: Auth
  - name: Media
  - name: Activity
  - name: Settings
  - name: Users
  - name: System
  - name: Events
paths:
  /health:
    get:
      operationId: getHealth
      tags:
        - Health
      summary: Get application health
      responses:
        "200":
          description: Application health state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/login:
    post:
      operationId: login
      tags:
        - Auth
      summary: Log in with local admin credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded and session cookie was set
          headers:
            Set-Cookie:
              description: Secure HTTP-only session cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/logout:
    post:
      operationId: logout
      tags:
        - Auth
      summary: Log out and clear the current session
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Logout succeeded
          headers:
            Set-Cookie:
              description: Expired session cookie
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/session:
    get:
      operationId: getSession
      tags:
        - Auth
      summary: Get current session
      responses:
        "200":
          description: Current session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
  /profile:
    get:
      operationId: getProfile
      tags:
        - Users
      summary: Get current user profile
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateProfile
      tags:
        - Users
      summary: Update current user profile
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdateRequest"
      responses:
        "200":
          description: Current user profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/search:
    post:
      operationId: searchMedia
      tags:
        - Media
      summary: Search for a movie or series candidate
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaSearchRequest"
      responses:
        "200":
          description: Media search candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/discover:
    get:
      operationId: getMediaDiscover
      tags:
        - Media
      summary: Get provider-backed discovery sections
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Discovery sections for movies and series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaDiscoverResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/discover/movies/search:
    get:
      operationId: searchDiscoverMovies
      tags:
        - Media
      summary: Search provider-backed movie discovery with filters
      security:
        - sessionCookie: []
      parameters:
        - name: sort
          in: query
          schema:
            type: string
            default: popularity.desc
        - name: page
          in: query
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: releaseDateFrom
          in: query
          schema:
            type: string
            format: date
        - name: releaseDateTo
          in: query
          schema:
            type: string
            format: date
        - name: studios
          in: query
          schema:
            type: array
            items:
              type: string
        - name: genres
          in: query
          schema:
            type: array
            items:
              type: string
        - name: keywords
          in: query
          schema:
            type: array
            items:
              type: string
        - name: withoutGenres
          in: query
          schema:
            type: array
            items:
              type: string
        - name: withoutKeywords
          in: query
          schema:
            type: array
            items:
              type: string
        - name: originalLanguages
          in: query
          schema:
            type: array
            items:
              type: string
        - name: contentRatings
          in: query
          schema:
            type: array
            items:
              type: string
        - name: runtimeMin
          in: query
          schema:
            type: integer
            format: int32
            minimum: 0
            maximum: 400
        - name: runtimeMax
          in: query
          schema:
            type: integer
            format: int32
            minimum: 0
            maximum: 400
        - name: scoreMin
          in: query
          schema:
            type: number
            format: double
            minimum: 0
            maximum: 10
        - name: scoreMax
          in: query
          schema:
            type: number
            format: double
            minimum: 0
            maximum: 10
        - name: minVoteCount
          in: query
          schema:
            type: integer
            format: int32
            minimum: 0
            maximum: 1000
      responses:
        "200":
          description: Filtered movie discovery results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverMovieSearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/discover/movies/facets/{facet}:
    get:
      operationId: autocompleteDiscoverMovieFacet
      tags:
        - Media
      summary: Autocomplete movie discovery filters
      security:
        - sessionCookie: []
      parameters:
        - name: facet
          in: path
          required: true
          schema:
            type: string
            enum:
              - genres
              - studios
              - keywords
        - name: query
          in: query
          required: false
          schema:
            type: string
            maxLength: 100
      responses:
        "200":
          description: Facet suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverMovieFacetResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/discover/series/search:
    get:
      operationId: searchDiscoverSeries
      tags:
        - Media
      summary: Search provider-backed series discovery with filters
      security:
        - sessionCookie: []
      parameters:
        - name: sort
          in: query
          schema:
            type: string
            default: popularity.desc
        - name: page
          in: query
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: releaseDateFrom
          in: query
          schema:
            type: string
            format: date
        - name: releaseDateTo
          in: query
          schema:
            type: string
            format: date
        - name: studios
          in: query
          schema:
            type: array
            items:
              type: string
        - name: genres
          in: query
          schema:
            type: array
            items:
              type: string
        - name: keywords
          in: query
          schema:
            type: array
            items:
              type: string
        - name: withoutGenres
          in: query
          schema:
            type: array
            items:
              type: string
        - name: withoutKeywords
          in: query
          schema:
            type: array
            items:
              type: string
        - name: originalLanguages
          in: query
          schema:
            type: array
            items:
              type: string
        - name: contentRatings
          in: query
          schema:
            type: array
            items:
              type: string
        - name: status
          in: query
          schema:
            type: array
            items:
              type: string
        - name: runtimeMin
          in: query
          schema:
            type: integer
            format: int32
            minimum: 0
            maximum: 400
        - name: runtimeMax
          in: query
          schema:
            type: integer
            format: int32
            minimum: 0
            maximum: 400
        - name: scoreMin
          in: query
          schema:
            type: number
            format: double
            minimum: 0
            maximum: 10
        - name: scoreMax
          in: query
          schema:
            type: number
            format: double
            minimum: 0
            maximum: 10
        - name: minVoteCount
          in: query
          schema:
            type: integer
            format: int32
            minimum: 0
            maximum: 1000
      responses:
        "200":
          description: Filtered series discovery results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverMovieSearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/discover/series/facets/{facet}:
    get:
      operationId: autocompleteDiscoverSeriesFacet
      tags:
        - Media
      summary: Autocomplete series discovery filters
      security:
        - sessionCookie: []
      parameters:
        - name: facet
          in: path
          required: true
          schema:
            type: string
            enum:
              - genres
              - studios
              - keywords
        - name: query
          in: query
          required: false
          schema:
            type: string
            maxLength: 100
      responses:
        "200":
          description: Facet suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverMovieFacetResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/discover/blacklist:
    get:
      operationId: listDiscoverBlacklist
      tags:
        - Media
      summary: List discover blacklist entries
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Blacklisted discover media
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverBlacklistResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: addDiscoverBlacklistItem
      tags:
        - Media
      summary: Add media to the discover blacklist
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoverBlacklistRequest"
      responses:
        "201":
          description: Blacklisted discover media
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverBlacklistItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/discover/blacklist/{id}:
    delete:
      operationId: deleteDiscoverBlacklistItem
      tags:
        - Media
      summary: Remove media from the discover blacklist
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Blacklist entry removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/discover/{sectionId}:
    get:
      operationId: getMediaDiscoverSection
      tags:
        - Media
      summary: Get one provider-backed discovery section
      security:
        - sessionCookie: []
      parameters:
        - name: sectionId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 40
            default: 20
      responses:
        "200":
          description: Discovery section
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaDiscoverSection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/autocomplete:
    get:
      operationId: autocompleteMedia
      tags:
        - Media
      summary: Search local library and metadata providers for autocomplete
      security:
        - sessionCookie: []
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 500
        - name: includeLibrary
          in: query
          required: false
          schema:
            type: boolean
            default: true
        - name: includeProviders
          in: query
          required: false
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Grouped autocomplete results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaGroupedSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/advanced-search:
    post:
      operationId: advancedSearchMedia
      tags:
        - Media
      summary: Search selected metadata providers with detailed filters
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaAdvancedSearchRequest"
      responses:
        "200":
          description: Grouped advanced media search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaGroupedSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/metadata/{provider}/{type}/{externalId}:
    parameters:
      - name: provider
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/MetadataProviderType"
      - name: type
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/MediaType"
      - name: externalId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 200
    get:
      operationId: getMediaMetadataDetails
      tags:
        - Media
      summary: Get provider metadata details for a media candidate
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Provider metadata details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaMetadataDetails"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /people/{provider}/{personId}:
    parameters:
      - name: provider
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/MetadataProviderType"
      - name: personId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 200
    get:
      operationId: getPersonDetails
      tags:
        - Media
      summary: Get provider person details and appearances
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Person details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonDetails"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/collections/{provider}/{collectionId}:
    parameters:
      - name: provider
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/MetadataProviderType"
      - name: collectionId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 100
    get:
      operationId: getMediaCollection
      tags:
        - Media
      summary: Get metadata for a movie collection
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Collection metadata and movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items:
    get:
      operationId: listMediaItems
      tags:
        - Media
      summary: List monitored media items
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Monitored media items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItemListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMediaItem
      tags:
        - Media
      summary: Add a monitored media item
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaItemCreateRequest"
      responses:
        "201":
          description: Media item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/requests:
    get:
      operationId: listMediaRequests
      tags:
        - Media
      summary: List media requests visible to the current user
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Media requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRequestListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMediaRequest
      tags:
        - Media
      summary: Create a media request for admin approval
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaRequestCreateRequest"
      responses:
        "201":
          description: Media request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/requests/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      operationId: getMediaRequest
      tags:
        - Media
      summary: Get a media request
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Media request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/requests/{id}/approve:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: approveMediaRequest
      tags:
        - Media
      summary: Approve a media request and add it to monitored media
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaRequestApproveRequest"
      responses:
        "200":
          description: Media request approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRequestApproveResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    put:
      operationId: updateMediaItem
      tags:
        - Media
      summary: Update monitored media item settings
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaItemUpdateRequest"
      responses:
        "200":
          description: Updated media item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteMediaItem
      tags:
        - Media
      summary: Remove a monitored media item
      security:
        - sessionCookie: []
      parameters:
        - name: keepFiles
          in: query
          description: Remove the media item from the app without deleting its media folder.
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "204":
          description: Media item removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/files/rescan:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: rescanMediaItemFiles
      tags:
        - Media
      summary: Rescan a media item folder for media and metadata files
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Media item with refreshed file list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/files/stream:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - $ref: "#/components/parameters/MediaFilePath"
    get:
      operationId: streamMediaItemFile
      tags:
        - Media
      summary: Stream one media file with HTTP range support
      security:
        - sessionCookie: []
      parameters:
        - name: streamExpires
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: streamToken
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Media file stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/files/preview:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - $ref: "#/components/parameters/MediaFilePath"
    get:
      operationId: previewMediaItemFile
      tags:
        - Media
      summary: Stream a browser-compatible media file preview
      security:
        - sessionCookie: []
      parameters:
        - name: audioTrackIndex
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
        - name: clientProfile
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MediaFilePreviewClientProfile"
        - name: startTimeSeconds
          in: query
          required: false
          schema:
            type: number
            format: double
            minimum: 0
      responses:
        "200":
          description: Browser-compatible preview stream
          content:
            video/mp4:
              schema:
                type: string
                format: binary
            application/vnd.apple.mpegurl:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/files/preview-segment:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - $ref: "#/components/parameters/MediaFilePath"
    get:
      operationId: previewMediaItemFileSegment
      tags:
        - Media
      summary: Stream one browser preview HLS segment
      security:
        - sessionCookie: []
      parameters:
        - name: audioTrackIndex
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
        - name: clientProfile
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MediaFilePreviewClientProfile"
        - name: segmentStartSeconds
          in: query
