openapi: 3.0.3
info:
  title: Media Manager API
  version: 0.0.0
  description: >
    Contract-first API for the self-hosted media manager. The project name is
    not final; do not use the codename in generated public identifiers.
servers:
  - url: /api
    description: Same-origin API served by the Go backend
tags:
  - name: Health
  - name: Auth
  - name: Media
  - name: Activity
  - name: Settings
  - name: Users
  - name: System
  - name: Events
paths:
  /health:
    get:
      operationId: getHealth
      tags:
        - Health
      summary: Get application health
      responses:
        "200":
          description: Application health state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/login:
    post:
      operationId: login
      tags:
        - Auth
      summary: Log in with local admin credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded and session cookie was set
          headers:
            Set-Cookie:
              description: Secure HTTP-only session cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/logout:
    post:
      operationId: logout
      tags:
        - Auth
      summary: Log out and clear the current session
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Logout succeeded
          headers:
            Set-Cookie:
              description: Expired session cookie
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/session:
    get:
      operationId: getSession
      tags:
        - Auth
      summary: Get current session
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Current authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/search:
    post:
      operationId: searchMedia
      tags:
        - Media
      summary: Search for a movie or series candidate
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaSearchRequest"
      responses:
        "200":
          description: Media search candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/discover:
    get:
      operationId: getMediaDiscover
      tags:
        - Media
      summary: Get provider-backed discovery sections
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Discovery sections for movies and series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaDiscoverResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/autocomplete:
    get:
      operationId: autocompleteMedia
      tags:
        - Media
      summary: Search local library and metadata providers for autocomplete
      security:
        - sessionCookie: []
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 500
        - name: includeLibrary
          in: query
          required: false
          schema:
            type: boolean
            default: true
        - name: includeProviders
          in: query
          required: false
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Grouped autocomplete results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaGroupedSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/advanced-search:
    post:
      operationId: advancedSearchMedia
      tags:
        - Media
      summary: Search selected metadata providers with detailed filters
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaAdvancedSearchRequest"
      responses:
        "200":
          description: Grouped advanced media search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaGroupedSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/metadata/{provider}/{type}/{externalId}:
    parameters:
      - name: provider
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/MetadataProviderType"
      - name: type
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/MediaType"
      - name: externalId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 200
    get:
      operationId: getMediaMetadataDetails
      tags:
        - Media
      summary: Get provider metadata details for a media candidate
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Provider metadata details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaMetadataDetails"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items:
    get:
      operationId: listMediaItems
      tags:
        - Media
      summary: List monitored media items
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Monitored media items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItemListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMediaItem
      tags:
        - Media
      summary: Add a monitored media item
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaItemRequest"
      responses:
        "201":
          description: Media item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/requests:
    get:
      operationId: listMediaRequests
      tags:
        - Media
      summary: List media requests visible to the current user
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Media requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRequestListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMediaRequest
      tags:
        - Media
      summary: Create a media request for admin approval
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaRequestCreateRequest"
      responses:
        "201":
          description: Media request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/requests/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      operationId: getMediaRequest
      tags:
        - Media
      summary: Get a media request
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Media request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/requests/{id}/approve:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: approveMediaRequest
      tags:
        - Media
      summary: Approve a media request and add it to monitored media
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaRequestApproveRequest"
      responses:
        "200":
          description: Media request approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRequestApproveResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    delete:
      operationId: deleteMediaItem
      tags:
        - Media
      summary: Remove a monitored media item
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Media item removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/releases:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      operationId: searchMediaReleases
      tags:
        - Media
      summary: List latest release candidates for a monitored item
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Latest release candidates found by background search jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseSearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/release-searches:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: enqueueMediaReleaseSearch
      tags:
        - Media
      summary: Enqueue a background release search for a monitored item
      security:
        - sessionCookie: []
      responses:
        "202":
          description: Release search job enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobEnqueueResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/grab:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: grabMediaRelease
      tags:
        - Media
      summary: Enqueue a release grab with the highest-priority enabled download client
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrabReleaseRequest"
      responses:
        "202":
          description: Release grab job enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrabReleaseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /activity/downloads:
    get:
      operationId: listDownloadActivity
      tags:
        - Activity
      summary: List recent download activity
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Recent download activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadActivityListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/download-clients:
    get:
      operationId: listDownloadClients
      tags:
        - Settings
      summary: List configured download clients
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Configured download clients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadClientListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createDownloadClient
      tags:
        - Settings
      summary: Create a download client
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadClientRequest"
      responses:
        "201":
          description: Download client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadClient"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/download-clients/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    put:
      operationId: updateDownloadClient
      tags:
        - Settings
      summary: Update a download client
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadClientRequest"
      responses:
        "200":
          description: Download client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadClient"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteDownloadClient
      tags:
        - Settings
      summary: Delete a download client
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Download client deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/download-clients/{id}/test:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: testDownloadClient
      tags:
        - Settings
      summary: Test a configured download client
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Download client test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationTestResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/indexers:
    get:
      operationId: listIndexers
      tags:
        - Settings
      summary: List configured indexers
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Configured indexers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexerListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createIndexer
      tags:
        - Settings
      summary: Create an indexer
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexerRequest"
      responses:
        "201":
          description: Indexer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indexer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/indexers/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    put:
      operationId: updateIndexer
      tags:
        - Settings
      summary: Update an indexer
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexerRequest"
      responses:
        "200":
          description: Indexer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indexer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteIndexer
      tags:
        - Settings
      summary: Delete an indexer
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Indexer deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/indexers/{id}/test:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: testIndexer
      tags:
        - Settings
      summary: Test a configured indexer
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Indexer test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationTestResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/metadata-providers:
    get:
      operationId: listMetadataProviders
      tags:
        - Settings
      summary: List configured metadata providers
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Configured metadata providers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataProviderListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMetadataProvider
      tags:
        - Settings
      summary: Create a metadata provider
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataProviderRequest"
      responses:
        "201":
          description: Metadata provider created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataProvider"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/metadata-providers/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    put:
      operationId: updateMetadataProvider
      tags:
        - Settings
      summary: Update a metadata provider
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataProviderRequest"
      responses:
        "200":
          description: Metadata provider updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataProvider"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteMetadataProvider
      tags:
        - Settings
      summary: Delete a metadata provider
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Metadata provider deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/metadata-providers/{id}/test:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: testMetadataProvider
      tags:
        - Settings
      summary: Test a configured metadata provider
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Metadata provider test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationTestResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/metadata-cache:
    get:
      operationId: getMetadataCache
      tags:
        - Settings
      summary: Inspect metadata provider cache entries and stats
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Metadata cache stats and entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataCacheResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: clearMetadataCache
      tags:
        - Settings
      summary: Clear all metadata provider cache entries
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Metadata cache clear result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataCacheClearResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/metadata-cache/reset:
    post:
      operationId: clearMetadataCacheByPattern
      tags:
        - Settings
      summary: Clear metadata provider cache entries matching a regex
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataCacheClearRequest"
      responses:
        "200":
          description: Metadata cache clear result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataCacheClearResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/tags:
    get:
      operationId: listTags
      tags:
        - Settings
      summary: List media tags
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Media tags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createTag
      tags:
        - Settings
      summary: Create a media tag
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagRequest"
      responses:
        "201":
          description: Media tag created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /settings/tags/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    put:
      operationId: updateTag
      tags:
        - Settings
      summary: Update a media tag
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagRequest"
      responses:
        "200":
          description: Media tag updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTag
      tags:
        - Settings
      summary: Delete a media tag
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Media tag deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/library/folder-options:
    get:
      operationId: listLibraryFolderOptions
      tags:
        - Settings
      summary: Browse server-visible folders for library selection
      security:
        - sessionCookie: []
      parameters:
        - name: path
          in: query
          schema:
            type: string
            maxLength: 4000
      responses:
        "200":
          description: Folder picker options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryFolderOptionListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createLibraryFolderOption
      tags:
        - Settings
      summary: Create a server-visible child folder for library selection
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryFolderOptionCreateRequest"
      responses:
        "201":
          description: Folder created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryFolderOption"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/library/folders:
    get:
      operationId: listLibraryFolders
      tags:
        - Settings
      summary: List configured library folders
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Configured library folders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryFolderListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createLibraryFolder
      tags:
        - Settings
      summary: Add a library folder and scan it for media
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryFolderRequest"
      responses:
        "201":
          description: Library folder added and scan completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryFolderCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/library/folders/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    delete:
      operationId: deleteLibraryFolder
      tags:
        - Settings
      summary: Remove a configured library folder
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Library folder removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/library/scans/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      operationId: getLibraryScan
      tags:
        - Settings
      summary: Get a library folder scan with discovered media review items
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Library scan review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryScan"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/library/scans/{id}/items/{itemId}/match:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - name: itemId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: matchLibraryScanItem
      tags:
        - Settings
      summary: Manually match a discovered file to a movie, series, or anime item
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryScanItemMatchRequest"
      responses:
        "200":
          description: Discovered item matched and added to monitored media
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryScanItemMatchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/users:
    get:
      operationId: listUsers
      tags:
        - Users
      summary: List local users
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Local users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createUser
      tags:
        - Users
      summary: Create a local user
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedUser"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /settings/users/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    put:
      operationId: updateUser
      tags:
        - Users
      summary: Update a local user
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedUser"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteUser
      tags:
        - Users
      summary: Delete a local user
      security:
        - sessionCookie: []
      responses:
        "204":
          description: User deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /system/tools:
    get:
      operationId: getToolStatus
      tags:
        - System
      summary: Get detected media tool capabilities
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Media tool availability and versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /events:
    get:
      operationId: streamEvents
      tags:
        - Events
      summary: Stream server-sent application events
      description: >
        Server-Sent Events stream for queue, job, search, import, subtitle,
        and assembly progress. Each event data payload is an EventEnvelope JSON
        object.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Event stream
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or session invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: The authenticated user is not allowed to perform this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - version
        - commit
        - time
      properties:
        status:
          $ref: "#/components/schemas/HealthStatus"
        version:
          type: string
          examples:
            - 0.0.0-dev
        commit:
          type: string
          examples:
            - dev
        time:
          type: string
          format: date-time
    HealthStatus:
      type: string
      enum:
        - ok
        - degraded
        - unavailable
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 200
        password:
          type: string
          minLength: 1
          maxLength: 1024
    SessionResponse:
      type: object
      additionalProperties: false
      required:
        - authenticated
      properties:
        authenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/UserSummary"
        expiresAt:
          type: string
          format: date-time
    UserSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - username
        - role
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
    UserRole:
      type: string
      enum:
        - admin
        - user
    UserListResponse:
      type: object
      additionalProperties: false
      required:
        - users
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/ManagedUser"
    ManagedUser:
      type: object
      additionalProperties: false
      required:
        - id
        - username
        - role
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UserCreateRequest:
      type: object
      additionalProperties: false
      required:
        - username
        - password
        - role
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 200
        password:
          type: string
          minLength: 8
          maxLength: 1024
        role:
          $ref: "#/components/schemas/UserRole"
    UserUpdateRequest:
      type: object
      additionalProperties: false
      required:
        - username
        - role
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 200
        password:
          type: string
          minLength: 8
          maxLength: 1024
        role:
          $ref: "#/components/schemas/UserRole"
    MediaType:
      type: string
      enum:
        - movie
        - series
    MediaSearchRequest:
      type: object
      additionalProperties: false
      required:
        - query
        - type
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 500
        type:
          $ref: "#/components/schemas/MediaType"
        year:
          type: integer
          format: int32
          minimum: 1800
          maximum: 3000
    MediaSearchResponse:
      type: object
      additionalProperties: false
      required:
