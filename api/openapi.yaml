      tags:
        - System
      summary: Stream live application logs
      description: >
        Server-Sent Events stream of application logs. Each event data payload
        is a SystemLogEntry JSON object.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Application log stream
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/log-level:
    get:
      operationId: getSystemLogLevel
      tags:
        - System
      summary: Get application log verbosity
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Current application log verbosity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemLogLevelResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      operationId: updateSystemLogLevel
      tags:
        - System
      summary: Update application log verbosity
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemLogLevelRequest"
      responses:
        "200":
          description: Updated application log verbosity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemLogLevelResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/log-file-settings:
    get:
      operationId: getSystemLogFileSettings
      tags:
        - System
      summary: Get log file settings
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Current log file settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemLogFileSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      operationId: updateSystemLogFileSettings
      tags:
        - System
      summary: Update log file settings
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemLogFileSettingsRequest"
      responses:
        "200":
          description: Updated log file settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemLogFileSettings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/log-files:
    get:
      operationId: listSystemLogFiles
      tags:
        - System
      summary: List retained log files
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Retained log files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemLogFileListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/log-files/{name}/download:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: downloadSystemLogFile
      tags:
        - System
      summary: Download a retained log file
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Log file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /system/events:
    get:
      operationId: listSystemEvents
      tags:
        - System
      summary: List notable application events
      parameters:
        - name: before
          in: query
          schema:
            type: string
            format: date-time
          description: Return events created before this timestamp.
        - name: limit
          in: query
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Recent application events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemEventListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      operationId: clearSystemEvents
      tags:
        - System
      summary: Delete all system events
      security:
        - sessionCookie: []
      responses:
        "204":
          description: System events deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/events/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    delete:
      operationId: deleteSystemEvent
      tags:
        - System
      summary: Delete a system event
      security:
        - sessionCookie: []
      responses:
        "204":
          description: System event deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /events:
    get:
      operationId: streamEvents
      tags:
        - Events
      summary: Stream server-sent application events
      description: >
        Server-Sent Events stream for queue, job, search, import, subtitle,
        and assembly progress. Each event data payload is an EventEnvelope JSON
        object.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Event stream
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MediaFilePath:
      name: path
      in: query
      required: true
      schema:
        type: string
        minLength: 1
    ProfileId:
      name: id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 100
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or session invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: The authenticated user is not allowed to perform this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - version
        - commit
        - time
      properties:
        status:
          $ref: "#/components/schemas/HealthStatus"
        version:
          type: string
          examples:
            - 0.0.0-dev
        commit:
          type: string
          examples:
            - dev
        time:
          type: string
          format: date-time
    HealthStatus:
      type: string
      enum:
        - ok
        - degraded
        - unavailable
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 200
        password:
          type: string
          minLength: 1
          maxLength: 1024
    SessionResponse:
      type: object
      additionalProperties: false
      required:
        - authenticated
      properties:
        authenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/UserSummary"
        expiresAt:
          type: string
          format: date-time
    UserSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - username
        - role
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        pictureUrl:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
    UserProfile:
      type: object
      additionalProperties: false
      required:
        - id
        - username
        - displayName
        - pictureUrl
        - role
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        pictureUrl:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        updatedAt:
          type: string
          format: date-time
    UserProfileUpdateRequest:
      type: object
      additionalProperties: false
      required:
        - displayName
        - pictureUrl
      properties:
        displayName:
          type: string
          maxLength: 200
        pictureUrl:
          type: string
          maxLength: 2000
    UserRole:
      type: string
      enum:
        - admin
        - user
    UserListResponse:
      type: object
      additionalProperties: false
      required:
        - users
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/ManagedUser"
    ManagedUser:
      type: object
      additionalProperties: false
      required:
        - id
