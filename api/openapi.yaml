openapi: 3.0.3
info:
  title: Media Manager API
  version: 0.0.0
  description: >
    Contract-first API for the self-hosted media manager. The project name is
    not final; do not use the codename in generated public identifiers.
servers:
  - url: /api
    description: Same-origin API served by the Go backend
tags:
  - name: Health
  - name: Auth
  - name: Media
  - name: Activity
  - name: Settings
  - name: System
  - name: Events
paths:
  /health:
    get:
      operationId: getHealth
      tags:
        - Health
      summary: Get application health
      responses:
        "200":
          description: Application health state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/login:
    post:
      operationId: login
      tags:
        - Auth
      summary: Log in with local admin credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded and session cookie was set
          headers:
            Set-Cookie:
              description: Secure HTTP-only session cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/logout:
    post:
      operationId: logout
      tags:
        - Auth
      summary: Log out and clear the current session
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Logout succeeded
          headers:
            Set-Cookie:
              description: Expired session cookie
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/session:
    get:
      operationId: getSession
      tags:
        - Auth
      summary: Get current session
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Current authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/search:
    post:
      operationId: searchMedia
      tags:
        - Media
      summary: Search for a movie or series candidate
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaSearchRequest"
      responses:
        "200":
          description: Media search candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/items:
    get:
      operationId: listMediaItems
      tags:
        - Media
      summary: List monitored media items
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Monitored media items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItemListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMediaItem
      tags:
        - Media
      summary: Add a monitored media item
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaItemRequest"
      responses:
        "201":
          description: Media item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/items/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    delete:
      operationId: deleteMediaItem
      tags:
        - Media
      summary: Remove a monitored media item
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Media item removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/releases:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      operationId: searchMediaReleases
      tags:
        - Media
      summary: List latest release candidates for a monitored item
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Latest release candidates found by background search jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseSearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/release-searches:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: enqueueMediaReleaseSearch
      tags:
        - Media
      summary: Enqueue a background release search for a monitored item
      security:
        - sessionCookie: []
      responses:
        "202":
          description: Release search job enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobEnqueueResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/grab:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: grabMediaRelease
      tags:
        - Media
      summary: Enqueue a release grab with the highest-priority enabled download client
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrabReleaseRequest"
      responses:
        "202":
          description: Release grab job enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrabReleaseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /activity/downloads:
    get:
      operationId: listDownloadActivity
      tags:
        - Activity
      summary: List recent download activity
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Recent download activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadActivityListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/download-clients:
    get:
      operationId: listDownloadClients
      tags:
        - Settings
      summary: List configured download clients
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Configured download clients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadClientListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createDownloadClient
      tags:
        - Settings
      summary: Create a download client
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadClientRequest"
      responses:
        "201":
          description: Download client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadClient"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/download-clients/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    put:
      operationId: updateDownloadClient
      tags:
        - Settings
      summary: Update a download client
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadClientRequest"
      responses:
        "200":
          description: Download client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadClient"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteDownloadClient
      tags:
        - Settings
      summary: Delete a download client
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Download client deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/download-clients/{id}/test:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: testDownloadClient
      tags:
        - Settings
      summary: Test a configured download client
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Download client test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationTestResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/indexers:
    get:
      operationId: listIndexers
      tags:
        - Settings
      summary: List configured indexers
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Configured indexers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexerListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createIndexer
      tags:
        - Settings
      summary: Create an indexer
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexerRequest"
      responses:
        "201":
          description: Indexer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indexer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/indexers/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    put:
      operationId: updateIndexer
      tags:
        - Settings
      summary: Update an indexer
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexerRequest"
      responses:
        "200":
          description: Indexer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indexer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteIndexer
      tags:
        - Settings
      summary: Delete an indexer
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Indexer deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/indexers/{id}/test:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: testIndexer
      tags:
        - Settings
      summary: Test a configured indexer
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Indexer test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationTestResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /system/tools:
    get:
      operationId: getToolStatus
      tags:
        - System
      summary: Get detected media tool capabilities
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Media tool availability and versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /events:
    get:
      operationId: streamEvents
      tags:
        - Events
      summary: Stream server-sent application events
      description: >
        Server-Sent Events stream for queue, job, search, import, subtitle,
        and assembly progress. Each event data payload is an EventEnvelope JSON
        object.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Event stream
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or session invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - version
        - commit
        - time
      properties:
        status:
          $ref: "#/components/schemas/HealthStatus"
        version:
          type: string
          examples:
            - 0.0.0-dev
        commit:
          type: string
          examples:
            - dev
        time:
          type: string
          format: date-time
    HealthStatus:
      type: string
      enum:
        - ok
        - degraded
        - unavailable
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 200
        password:
          type: string
          minLength: 1
          maxLength: 1024
    SessionResponse:
      type: object
      additionalProperties: false
      required:
        - authenticated
      properties:
        authenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/UserSummary"
        expiresAt:
          type: string
          format: date-time
    UserSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - username
        - role
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
    UserRole:
      type: string
      enum:
        - admin
    MediaType:
      type: string
      enum:
        - movie
        - series
    MediaSearchRequest:
      type: object
      additionalProperties: false
      required:
        - query
        - type
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 500
        type:
          $ref: "#/components/schemas/MediaType"
        year:
          type: integer
          format: int32
          minimum: 1800
          maximum: 3000
    MediaSearchResponse:
      type: object
      additionalProperties: false
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/MediaSearchResult"
    MediaSearchResult:
      type: object
      additionalProperties: false
      required:
        - title
        - type
      properties:
        title:
          type: string
        type:
          $ref: "#/components/schemas/MediaType"
        year:
          type: integer
          format: int32
    MediaItemListResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MediaItem"
    MediaItem:
      allOf:
        - $ref: "#/components/schemas/MediaItemRequest"
        - type: object
          additionalProperties: false
          required:
            - id
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    MediaItemRequest:
      type: object
      additionalProperties: false
      required:
        - title
        - type
        - monitored
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        type:
          $ref: "#/components/schemas/MediaType"
        year:
          type: integer
          format: int32
          minimum: 1800
          maximum: 3000
        monitored:
          type: boolean
    ReleaseSearchResponse:
      type: object
      additionalProperties: false
      required:
        - releases
        - errors
      properties:
        releases:
          type: array
          items:
            $ref: "#/components/schemas/ReleaseCandidate"
        errors:
          type: array
          items:
            type: string
    ReleaseCandidate:
      type: object
      additionalProperties: false
      required:
        - id
        - indexerName
        - indexerType
        - title
        - sizeBytes
      properties:
        id:
          type: string
          format: uuid
        indexerId:
          type: string
          format: uuid
        indexerName:
          type: string
        indexerType:
          $ref: "#/components/schemas/IndexerType"
        title:
          type: string
        infoUrl:
          type: string
        guid:
          type: string
        sizeBytes:
          type: integer
          format: int64
          minimum: 0
        seeders:
          type: integer
          format: int32
        peers:
          type: integer
          format: int32
    GrabReleaseRequest:
      type: object
      additionalProperties: false
      required:
        - releaseId
      properties:
        releaseId:
          type: string
          format: uuid
    GrabReleaseResponse:
      type: object
      additionalProperties: false
      required:
        - jobId
        - message
        - activity
      properties:
        jobId:
          type: integer
          format: int64
        message:
          type: string
        activity:
          $ref: "#/components/schemas/DownloadActivity"
    JobEnqueueResponse:
      type: object
      additionalProperties: false
      required:
        - jobId
        - message
      properties:
        jobId:
          type: integer
          format: int64
        message:
          type: string
    DownloadActivityListResponse:
      type: object
      additionalProperties: false
      required:
        - activities
      properties:
        activities:
          type: array
          items:
            $ref: "#/components/schemas/DownloadActivity"
    DownloadActivity:
      type: object
      additionalProperties: false
      required:
        - id
        - mediaItemId
        - mediaTitle
        - mediaType
        - releaseTitle
        - indexerName
        - downloadClientName
        - downloadUrl
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        mediaItemId:
          type: string
          format: uuid
        mediaTitle:
          type: string
        mediaType:
          $ref: "#/components/schemas/MediaType"
        releaseTitle:
          type: string
        indexerName:
          type: string
        downloadClientName:
          type: string
        downloadUrl:
          type: string
        status:
          type: string
          enum:
            - queued
            - grabbed
            - failed
        error:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DownloadClientListResponse:
      type: object
      additionalProperties: false
      required:
        - clients
      properties:
        clients:
          type: array
          items:
            $ref: "#/components/schemas/DownloadClient"
    DownloadClient:
      allOf:
        - $ref: "#/components/schemas/DownloadClientRequest"
        - type: object
          additionalProperties: false
          required:
            - id
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    DownloadClientRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - type
        - baseUrl
        - enabled
        - priority
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        type:
          $ref: "#/components/schemas/DownloadClientType"
        baseUrl:
          type: string
          minLength: 1
          maxLength: 2000
        username:
          type: string
          maxLength: 200
        password:
          type: string
          maxLength: 1024
        apiKey:
          type: string
          maxLength: 1024
        category:
          type: string
          maxLength: 200
        enabled:
          type: boolean
        priority:
          type: integer
          format: int32
          minimum: 0
          maximum: 1000
    DownloadClientType:
      type: string
      enum:
        - transmission
        - sabnzbd
    IndexerListResponse:
      type: object
      additionalProperties: false
      required:
        - indexers
      properties:
        indexers:
          type: array
          items:
            $ref: "#/components/schemas/Indexer"
    Indexer:
      allOf:
        - $ref: "#/components/schemas/IndexerRequest"
        - type: object
          additionalProperties: false
          required:
            - id
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    IndexerRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - type
        - baseUrl
        - enabled
        - priority
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        type:
          $ref: "#/components/schemas/IndexerType"
        baseUrl:
          type: string
          minLength: 1
          maxLength: 2000
        apiKey:
          type: string
          maxLength: 1024
        categories:
          type: array
          items:
            type: integer
            format: int32
          maxItems: 100
        enabled:
          type: boolean
        priority:
          type: integer
          format: int32
          minimum: 0
          maximum: 1000
    IndexerType:
      type: string
      enum:
        - torznab
        - newznab
        - rss
    IntegrationTestResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - message
        - latencyMs
        - checkedAt
        - details
      properties:
        success:
          type: boolean
        message:
          type: string
        latencyMs:
          type: integer
          format: int32
          minimum: 0
        checkedAt:
          type: string
          format: date-time
        details:
          type: object
          additionalProperties: true
    ToolStatusResponse:
      type: object
      additionalProperties: false
      required:
        - tools
      properties:
        tools:
          type: array
          items:
            $ref: "#/components/schemas/ToolStatus"
    ToolStatus:
      type: object
      additionalProperties: false
      required:
        - name
        - required
        - available
      properties:
        name:
          $ref: "#/components/schemas/ToolName"
        required:
          type: boolean
        available:
          type: boolean
        version:
          type: string
        path:
          type: string
        error:
          type: string
    ToolName:
      type: string
      enum:
        - ffmpeg
        - ffprobe
        - mkvmerge
        - mkvextract
        - mediainfo
    EventEnvelope:
      type: object
      additionalProperties: false
      required:
        - id
        - type
        - time
        - data
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/EventType"
        time:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true
    EventType:
      type: string
      enum:
        - system.heartbeat
        - job.created
        - job.updated
        - job.completed
        - job.failed
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
