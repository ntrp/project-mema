openapi: 3.0.3
info:
  title: Media Manager API
  version: 0.0.0
  description: >
    Contract-first API for the self-hosted media manager. The project name is
    not final; do not use the codename in generated public identifiers.
servers:
  - url: /api
    description: Same-origin API served by the Go backend
tags:
  - name: Health
  - name: Auth
  - name: System
  - name: Events
paths:
  /health:
    get:
      operationId: getHealth
      tags:
        - Health
      summary: Get application health
      responses:
        "200":
          description: Application health state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/login:
    post:
      operationId: login
      tags:
        - Auth
      summary: Log in with local admin credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded and session cookie was set
          headers:
            Set-Cookie:
              description: Secure HTTP-only session cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/logout:
    post:
      operationId: logout
      tags:
        - Auth
      summary: Log out and clear the current session
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Logout succeeded
          headers:
            Set-Cookie:
              description: Expired session cookie
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/session:
    get:
      operationId: getSession
      tags:
        - Auth
      summary: Get current session
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Current authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /system/tools:
    get:
      operationId: getToolStatus
      tags:
        - System
      summary: Get detected media tool capabilities
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Media tool availability and versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /events:
    get:
      operationId: streamEvents
      tags:
        - Events
      summary: Stream server-sent application events
      description: >
        Server-Sent Events stream for queue, job, search, import, subtitle,
        and assembly progress. Each event data payload is an EventEnvelope JSON
        object.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Event stream
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or session invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - version
        - commit
        - time
      properties:
        status:
          $ref: "#/components/schemas/HealthStatus"
        version:
          type: string
          examples:
            - 0.0.0-dev
        commit:
          type: string
          examples:
            - dev
        time:
          type: string
          format: date-time
    HealthStatus:
      type: string
      enum:
        - ok
        - degraded
        - unavailable
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 200
        password:
          type: string
          minLength: 1
          maxLength: 1024
    SessionResponse:
      type: object
      additionalProperties: false
      required:
        - authenticated
      properties:
        authenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/UserSummary"
        expiresAt:
          type: string
          format: date-time
    UserSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - username
        - role
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
    UserRole:
      type: string
      enum:
        - admin
    ToolStatusResponse:
      type: object
      additionalProperties: false
      required:
        - tools
      properties:
        tools:
          type: array
          items:
            $ref: "#/components/schemas/ToolStatus"
    ToolStatus:
      type: object
      additionalProperties: false
      required:
        - name
        - required
        - available
      properties:
        name:
          $ref: "#/components/schemas/ToolName"
        required:
          type: boolean
        available:
          type: boolean
        version:
          type: string
        path:
          type: string
        error:
          type: string
    ToolName:
      type: string
      enum:
        - ffmpeg
        - ffprobe
        - mkvmerge
        - mkvextract
        - mediainfo
    EventEnvelope:
      type: object
      additionalProperties: false
      required:
        - id
        - type
        - time
        - data
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/EventType"
        time:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true
    EventType:
      type: string
      enum:
        - system.heartbeat
        - job.created
        - job.updated
        - job.completed
        - job.failed
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
