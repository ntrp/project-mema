openapi: 3.0.3
info:
  title: Media Manager API
  version: 0.0.0
  description: >
    Contract-first API for the self-hosted media manager. The project name is
    not final; do not use the codename in generated public identifiers.
servers:
  - url: /api
    description: Same-origin API served by the Go backend
tags:
  - name: Health
  - name: Auth
  - name: Media
  - name: Activity
  - name: Settings
  - name: Users
  - name: System
  - name: Events
paths:
  /health:
    get:
      operationId: getHealth
      tags:
        - Health
      summary: Get application health
      responses:
        "200":
          description: Application health state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/login:
    post:
      operationId: login
      tags:
        - Auth
      summary: Log in with local admin credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded and session cookie was set
          headers:
            Set-Cookie:
              description: Secure HTTP-only session cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/logout:
    post:
      operationId: logout
      tags:
        - Auth
      summary: Log out and clear the current session
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Logout succeeded
          headers:
            Set-Cookie:
              description: Expired session cookie
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/session:
    get:
      operationId: getSession
      tags:
        - Auth
      summary: Get current session
      responses:
        "200":
          description: Current session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
  /media/search:
    post:
      operationId: searchMedia
      tags:
        - Media
      summary: Search for a movie or series candidate
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaSearchRequest"
      responses:
        "200":
          description: Media search candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/discover:
    get:
      operationId: getMediaDiscover
      tags:
        - Media
      summary: Get provider-backed discovery sections
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Discovery sections for movies and series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaDiscoverResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/autocomplete:
    get:
      operationId: autocompleteMedia
      tags:
        - Media
      summary: Search local library and metadata providers for autocomplete
      security:
        - sessionCookie: []
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 500
        - name: includeLibrary
          in: query
          required: false
          schema:
            type: boolean
            default: true
        - name: includeProviders
          in: query
          required: false
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Grouped autocomplete results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaGroupedSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/advanced-search:
    post:
      operationId: advancedSearchMedia
      tags:
        - Media
      summary: Search selected metadata providers with detailed filters
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaAdvancedSearchRequest"
      responses:
        "200":
          description: Grouped advanced media search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaGroupedSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/metadata/{provider}/{type}/{externalId}:
    parameters:
      - name: provider
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/MetadataProviderType"
      - name: type
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/MediaType"
      - name: externalId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 200
    get:
      operationId: getMediaMetadataDetails
      tags:
        - Media
      summary: Get provider metadata details for a media candidate
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Provider metadata details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaMetadataDetails"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/collections/{provider}/{collectionId}:
    parameters:
      - name: provider
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/MetadataProviderType"
      - name: collectionId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 100
    get:
      operationId: getMediaCollection
      tags:
        - Media
      summary: Get metadata for a movie collection
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Collection metadata and movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items:
    get:
      operationId: listMediaItems
      tags:
        - Media
      summary: List monitored media items
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Monitored media items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItemListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMediaItem
      tags:
        - Media
      summary: Add a monitored media item
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaItemCreateRequest"
      responses:
        "201":
          description: Media item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/requests:
    get:
      operationId: listMediaRequests
      tags:
        - Media
      summary: List media requests visible to the current user
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Media requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRequestListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMediaRequest
      tags:
        - Media
      summary: Create a media request for admin approval
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaRequestCreateRequest"
      responses:
        "201":
          description: Media request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /media/requests/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      operationId: getMediaRequest
      tags:
        - Media
      summary: Get a media request
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Media request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/requests/{id}/approve:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: approveMediaRequest
      tags:
        - Media
      summary: Approve a media request and add it to monitored media
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaRequestApproveRequest"
      responses:
        "200":
          description: Media request approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRequestApproveResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    delete:
      operationId: deleteMediaItem
      tags:
        - Media
      summary: Remove a monitored media item
      security:
        - sessionCookie: []
      parameters:
        - name: keepFiles
          in: query
          description: Remove the media item from the app without deleting its media folder.
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "204":
          description: Media item removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/files/rescan:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: rescanMediaItemFiles
      tags:
        - Media
      summary: Rescan a media item folder for media and metadata files
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Media item with refreshed file list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/releases:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      operationId: searchMediaReleases
      tags:
        - Media
      summary: List latest release candidates for a monitored item
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Latest release candidates found by background search jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseSearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/release-searches:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: enqueueMediaReleaseSearch
      tags:
        - Media
      summary: Enqueue a background release search for a monitored item
      security:
        - sessionCookie: []
      responses:
        "202":
          description: Release search job enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobEnqueueResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/automatic-searches:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: enqueueMediaAutomaticSearch
      tags:
        - Media
      summary: Enqueue an automatic search and grab for a monitored item
      security:
        - sessionCookie: []
      responses:
        "202":
          description: Automatic search job enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobEnqueueResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/files/delete:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: deleteMediaItemFile
      tags:
        - Media
      summary: Delete one media file and rescan the item folder
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaFileDeleteRequest"
      responses:
        "200":
          description: Media file deleted and item rescanned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/items/{id}/grab:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: grabMediaRelease
      tags:
        - Media
      summary: Enqueue a release grab with the highest-priority enabled download client
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrabReleaseRequest"
      responses:
        "202":
          description: Release grab job enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrabReleaseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /activity/downloads:
    get:
      operationId: listDownloadActivity
      tags:
        - Activity
      summary: List recent download activity
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Recent download activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadActivityListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /activity/downloads/{id}/cancel:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: cancelDownloadActivity
      tags:
        - Activity
      summary: Cancel an active download activity
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Download activity cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadActivity"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/download-clients:
    get:
      operationId: listDownloadClients
      tags:
        - Settings
      summary: List configured download clients
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Configured download clients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadClientListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createDownloadClient
      tags:
        - Settings
      summary: Create a download client
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadClientRequest"
      responses:
        "201":
          description: Download client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadClient"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/download-clients/test:
    post:
      operationId: testDownloadClientConfig
      tags:
        - Settings
      summary: Test a download client configuration
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadClientRequest"
      responses:
        "200":
          description: Download client test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationTestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/download-clients/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    put:
      operationId: updateDownloadClient
      tags:
        - Settings
      summary: Update a download client
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadClientRequest"
      responses:
        "200":
          description: Download client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadClient"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteDownloadClient
      tags:
        - Settings
      summary: Delete a download client
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Download client deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/download-clients/{id}/test:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: testDownloadClient
      tags:
        - Settings
      summary: Test a configured download client
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Download client test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationTestResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/indexers:
    get:
      operationId: listIndexers
      tags:
        - Settings
      summary: List configured indexers
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Configured indexers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexerListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createIndexer
      tags:
        - Settings
      summary: Create an indexer
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexerRequest"
      responses:
        "201":
          description: Indexer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indexer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/indexers/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    put:
      operationId: updateIndexer
      tags:
        - Settings
      summary: Update an indexer
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexerRequest"
      responses:
        "200":
          description: Indexer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indexer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteIndexer
      tags:
        - Settings
      summary: Delete an indexer
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Indexer deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/indexers/{id}/test:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: testIndexer
      tags:
        - Settings
      summary: Test a configured indexer
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Indexer test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationTestResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /system/event-settings:
    get:
      operationId: getSystemEventSettings
      tags:
        - System
      summary: Get system event retention settings
      security:
        - sessionCookie: []
      responses:
        "200":
          description: System event settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemEventSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      operationId: updateSystemEventSettings
      tags:
        - System
      summary: Update system event retention settings
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemEventSettingsRequest"
      responses:
        "200":
          description: System event settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemEventSettings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /settings/quality-sizes:
    get:
      operationId: listQualitySizeSettings
      tags:
        - Settings
      summary: List quality size settings
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Quality size settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QualitySizeSettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateQualitySizeSettings
      tags:
        - Settings
      summary: Update quality size settings
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QualitySizeSettingsUpdateRequest"
      responses:
        "200":
          description: Quality size settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QualitySizeSettingsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/file-naming:
    get:
      operationId: getFileNamingSettings
      tags:
        - Settings
      summary: Get file naming settings
      security:
        - sessionCookie: []
      responses:
        "200":
          description: File naming settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileNamingSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateFileNamingSettings
      tags:
        - Settings
      summary: Update file naming settings
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileNamingSettingsRequest"
      responses:
        "200":
          description: File naming settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileNamingSettings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settings/profiles:
    get:
      operationId: listMediaProfiles
      tags:
        - Settings
      summary: List media profiles
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Media profiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaProfileListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMediaProfile
      tags:
        - Settings
      summary: Create a media profile
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
